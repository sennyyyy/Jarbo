name: Publish release notes

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          test -f "release-notes/$GITHUB_REF_NAME.md"
          gh release create "$GITHUB_REF_NAME" \
            --verify-tag \
            --prerelease \
            --title "ALPHA Jarbo ${GITHUB_REF_NAME#v}" \
            --notes-file "release-notes/$GITHUB_REF_NAME.md"
